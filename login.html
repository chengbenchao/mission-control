<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION CONTROL · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080b12;
  --bg-card:  #0e111a;
  --surface:  #161b2a;
  --border:   rgba(196,163,74,0.12);
  --border-active: rgba(196,163,74,0.35);
  --text:     #eceae5;
  --text-2:   #a09b94;
  --text-3:   #5c5650;
  --gold:     #c4a34a;
  --gold-bright: #dbb85e;
  --gold-dim: #8a7234;
  --green:    #3fb950;
  --red:      #f85149;
  --red-dim:  #8b2c27;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── ambient glow ── */
.ambient {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.08;
  pointer-events: none;
}
.ambient-1 { width: 500px; height: 500px; background: var(--gold); top: -150px; left: -150px; }
.ambient-2 { width: 400px; height: 400px; background: #58a6ff; bottom: -100px; right: -100px; }

/* ── login card ── */
.login-wrap {
  position: relative;
  z-index: 1;
  width: 420px;
  max-width: 94vw;
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 44px 36px 36px;
  box-shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 40px rgba(0,0,0,.5);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

/* ── header ── */
.login-header {
  text-align: center;
  margin-bottom: 36px;
}

.logo-icon {
  display: inline-block;
  margin-bottom: 16px;
}

.logo-icon svg {
  width: 48px;
  height: 48px;
}

.login-header h1 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--gold);
  margin-bottom: 6px;
}

.login-header p {
  font-size: 13px;
  color: var(--text-3);
  letter-spacing: 0.03em;
}

/* ── form inputs ── */
.field {
  margin-bottom: 18px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.input-wrap {
  position: relative;
}

.input-wrap input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-body);
  outline: none;
  transition: border var(--transition), box-shadow var(--transition);
}

.input-wrap input:focus {
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px rgba(196,163,74,0.1);
}

.input-wrap input::placeholder {
  color: var(--text-3);
}

.input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
}

.input-icon svg {
  width: 17px;
  height: 17px;
}

/* ── error message ── */
.error-msg {
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(248,81,73,0.08);
  border: 1px solid rgba(248,81,73,0.2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 18px;
  font-size: 13px;
  color: var(--red);
  animation: shake 0.4s ease;
}

.error-msg.show { display: flex; }

.error-msg svg { width: 16px; height: 16px; flex-shrink: 0; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%  { transform: translateX(-6px); }
  40%  { transform: translateX(6px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
}

/* ── submit button ── */
.submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  border: none;
  border-radius: var(--radius-sm);
  color: #080b12;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
}

.submit-btn:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(196,163,74,0.25);
}

.submit-btn:active:not(:disabled) {
  transform: translateY(0);
}

.submit-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* ── loading spinner on button ── */
.submit-btn.loading {
  color: transparent;
  position: relative;
  pointer-events: none;
}

.submit-btn.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  margin: auto;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(8,11,18,0.3);
  border-top-color: #080b12;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── footer ── */
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.05em;
}

/* ── toast ── */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 24px;
  font-size: 13px;
  color: var(--text);
  box-shadow: var(--shadow-card, 0 4px 24px rgba(0,0,0,.4));
  z-index: 100;
  opacity: 0;
  transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.toast.ok { border-color: rgba(63,185,80,0.3); color: var(--green); }
.toast.err { border-color: rgba(248,81,73,0.3); color: var(--red); }
</style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="login-wrap">
  <div class="login-card">
    <!-- header -->
    <div class="login-header">
      <div class="logo-icon">
        <svg viewBox="0 0 48 48" fill="none">
          <path d="M24 4L6 14v6l18-10 18 10v-6L24 4z" fill="var(--gold)"/>
          <path d="M6 22v12l18 10 18-10V22L24 32 6 22z" fill="var(--gold)" opacity="0.6"/>
          <circle cx="24" cy="24" r="5" fill="none" stroke="var(--gold)" stroke-width="1.5"/>
          <path d="M24 19v3M24 26v3M19 24h3M26 24h3" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>MISSION CONTROL</h1>
      <p>身份验证 · 安全入口</p>
    </div>

    <!-- error -->
    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 4.5v4M8 11.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span id="errorText"></span>
    </div>

    <!-- username -->
    <div class="field">
      <label>用户名</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
          </svg>
        </span>
        <input type="text" id="username" placeholder="输入用户名" autocomplete="username" autofocus>
      </div>
    </div>

    <!-- password -->
    <div class="field">
      <label>密码</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
      </div>
    </div>

    <!-- submit -->
    <button class="submit-btn" id="submitBtn" disabled>登 录</button>

    <!-- footer -->
    <div class="login-footer">Hermes · Mission Control · 受保护的终端</div>
  </div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  Form
// ═══════════════════════════════════════
const userInput = document.getElementById('username');
const passInput = document.getElementById('password');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');
const toast = document.getElementById('toast');

function updateSubmit() {
  submitBtn.disabled = !(userInput.value.trim() && passInput.value.trim());
}

userInput.addEventListener('input', updateSubmit);
passInput.addEventListener('input', updateSubmit);

function showError(msg) {
  errorText.textContent = msg;
  errorMsg.classList.add('show');
  errorMsg.style.animation = 'none';
  errorMsg.offsetHeight; // reflow
  errorMsg.style.animation = 'shake 0.4s ease';
}

function hideError() {
  errorMsg.classList.remove('show');
}

function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Enter key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitBtn.click();
});

// ═══════════════════════════════════════
//  Submit
// ═══════════════════════════════════════
submitBtn.addEventListener('click', async () => {
  if (submitBtn.disabled) return;
  hideError();

  submitBtn.classList.add('loading');
  submitBtn.textContent = '';

  try {
    const res = await fetch('api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: userInput.value.trim(),
        password: passInput.value.trim(),
      }),
    });

    const data = await res.json();

    if (data.ok) {
      showToast('登录成功，即将跳转...', 'ok');
      setTimeout(() => {
        window.location.href = './';
      }, 600);
    } else {
      showError(data.error || '登录失败');
      submitBtn.classList.remove('loading');
      submitBtn.textContent = '登 录';
    }
  } catch (err) {
    showError('网络错误，请重试');
    submitBtn.classList.remove('loading');
    submitBtn.textContent = '登 录';
  }
});
</script>
</body>
</html>
