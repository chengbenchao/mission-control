<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISSION CONTROL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   MISSION CONTROL  v2  —  Obsidian Gold
   ═══════════════════════════════════════════════════════════════ */

:root {
  --bg:       #080b12;
  --bg-card:  #0e111a;
  --bg-hover: #131724;
  --surface:  #161b2a;
  --border:   rgba(255,255,255,0.05);
  --border-active: rgba(196,163,74,0.25);
  --text:     #eceae5;
  --text-2:   #a09b94;
  --text-3:   #5c5650;
  --gold:     #c4a34a;
  --gold-dim: #8a7234;
  --green:    #3fb950;
  --red:      #f85149;
  --amber:    #d29922;
  --cyan:     #58a6ff;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;
  --shadow-card: 0 1px 3px rgba(0,0,0,.4), 0 4px 24px rgba(0,0,0,.3);
  --shadow-lg:   0 4px 12px rgba(0,0,0,.5), 0 16px 48px rgba(0,0,0,.4);
  --transition:  .2s cubic-bezier(.4,0,.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text-2);
  font-family: var(--font-body);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding: 40px 0 80px;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(196,163,74,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 0% 50%, rgba(88,166,255,0.03) 0%, transparent 50%),
    radial-gradient(ellipse 50% 70% at 100% 80%, rgba(196,163,74,0.03) 0%, transparent 50%);
}

/* subtle dot grid overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 70%);
}

.container { 
  max-width: 1160px; margin: 0 auto; padding: 0 32px; 
  position: relative; z-index: 1;
}

/* ─── entrance animation ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeUp .5s ease both; }
.animate-in:nth-child(1) { animation-delay: .05s; }
.animate-in:nth-child(2) { animation-delay: .12s; }
.animate-in:nth-child(3) { animation-delay: .19s; }
.animate-in:nth-child(4) { animation-delay: .26s; }

/* ─── Header ─── */
.header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 40px; padding-bottom: 24px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--gold-dim), var(--border), transparent);
}
.header-left { display: flex; flex-direction: column; gap: 6px; }
.header h1 {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 700; font-style: italic;
  color: var(--text); letter-spacing: -0.5px;
  line-height: 1.1;
}
.header h1 span { color: var(--gold); font-style: normal; }
.header .subtitle {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--text-3); letter-spacing: 4px;
  text-transform: uppercase;
}
.meta-badge {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--text-3); letter-spacing: 3px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 6px 16px; background: var(--bg-card);
  white-space: nowrap;
}

/* ─── Stats Row ─── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 40px;
}
.stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative; overflow: hidden;
  transition: border-color var(--transition);
}
.stat:hover { border-color: rgba(255,255,255,0.1); }
.stat .stat-icon {
  font-size: 18px; opacity: .7;
  width: 32px; height: 32px; display: flex; align-items: center;
  justify-content: center; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03);
}
.stat .val {
  font-family: var(--font-mono);
  font-size: 28px; font-weight: 500; color: var(--text); line-height: 1;
  letter-spacing: -1px;
}
.stat .lbl {
  font-size: 10px; font-weight: 500; color: var(--text-3);
  letter-spacing: 2.5px; text-transform: uppercase;
}
.stat .bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; }
.stat .bar-fill { height: 100%; border-radius: 2px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.stat:nth-child(1) .bar-fill { background: var(--green); }
.stat:nth-child(2) .bar-fill { background: var(--gold); }
.stat:nth-child(3) .bar-fill { background: var(--cyan); }
.stat:nth-child(4) .bar-fill { background: var(--amber); }

/* status pulse dot for nodel online */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.stat:nth-child(1) .stat-icon { animation: pulse 2s ease infinite; }

/* ─── Section Header ─── */
.section-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
}
.section-header h2 {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 600; font-style: italic;
  color: var(--text); letter-spacing: -0.3px;
}
.section-count {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-3); letter-spacing: 1px;
  border: 1px solid var(--border); border-radius: 100px;
  padding: 3px 12px;
}
.section-refresh {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px; color: var(--text-3); letter-spacing: 1px;
}

/* ─── Service Grid ─── */
.svc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 10px; margin-bottom: 32px;
}
.svc-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px; cursor: pointer;
  transition: all var(--transition);
  position: relative;
  display: flex; flex-direction: column; gap: 12px;
}
.svc-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity var(--transition);
  pointer-events: none; z-index: 0;
}
.svc-card:hover {
  background: var(--bg-hover);
  border-color: rgba(255,255,255,0.1);
  transform: translateY(-1px);
  box-shadow: var(--shadow-card);
}
.svc-card:hover::before { opacity: 0; }

/* left accent stripe */
.svc-card::after {
  content: ''; position: absolute; left: 0; top: 10px; bottom: 10px;
  width: 2px; border-radius: 0 2px 2px 0; z-index: 1;
}
.svc-card.ok::after  { background: var(--green); box-shadow: 0 0 8px rgba(63,185,80,.4); }
.svc-card.err::after { background: var(--red);  box-shadow: 0 0 8px rgba(248,81,73,.4); }
.svc-card.warn::after{ background: var(--amber);box-shadow: 0 0 8px rgba(210,153,34,.4); }

.svc-top { 
  display: flex; align-items: center; gap: 10px; 
  position: relative; z-index: 1;
}
.svc-dot {
  width: 7px; height: 7px; flex-shrink: 0; border-radius: 50%;
  transition: box-shadow var(--transition);
}
.svc-card.ok .svc-dot  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.svc-card.err .svc-dot { background: var(--red);  box-shadow: 0 0 6px var(--red); }
.svc-card.warn .svc-dot{ background: var(--amber);box-shadow: 0 0 6px var(--amber); }

.svc-name {
  font-family: var(--font-body);
  font-size: 14px; font-weight: 500; color: var(--text);
  text-decoration: none; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  position: relative; z-index: 1;
}
a.svc-name { transition: color .15s; }
a.svc-name:hover { color: var(--gold); }

.svc-body {
  display: flex; align-items: center; gap: 16px;
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-3);
  letter-spacing: 0.5px; position: relative; z-index: 1;
}
.svc-body .key { color: var(--text-3); margin-right: 3px; }
.svc-body .val { color: var(--text-2); font-weight: 500; }

.svc-actions { 
  display: flex; gap: 6px; position: relative; z-index: 1;
}
.svc-actions button {
  font-family: var(--font-body);
  font-size: 10px; font-weight: 500;
  padding: 5px 12px; border-radius: 100px;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; letter-spacing: 0.5px;
  transition: all .15s;
}
.svc-actions button.logs    { color: var(--text-3); }
.svc-actions button.logs:hover    { border-color: var(--text-2); color: var(--text); background: rgba(255,255,255,0.03); }
.svc-actions button.restart { color: var(--amber); border-color: rgba(210,153,34,.2); }
.svc-actions button.restart:hover { background: rgba(210,153,34,.1); border-color: var(--amber); }
.svc-actions button.stop    { color: var(--red);   border-color: rgba(248,81,73,.2); }
.svc-actions button.stop:hover    { background: rgba(248,81,73,.1);  border-color: var(--red); }
.svc-actions button.start   { color: var(--green);  border-color: rgba(63,185,80,.2); }
.svc-actions button.start:hover   { background: rgba(63,185,80,.1); border-color: var(--green); }

/* ─── System Toggle ─── */
.sys-toggle {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-3);
  font-family: var(--font-body);
  font-size: 12px; font-weight: 500;
  letter-spacing: 1px;
  padding: 14px 22px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: all var(--transition);
}
.sys-toggle:hover { border-color: rgba(255,255,255,0.12); color: var(--text-2); }
.sys-toggle .arrow { transition: transform .3s; font-size: 10px; }
.sys-toggle.open .arrow { transform: rotate(90deg); }
.sys-grid { display: none; }
.sys-grid.open { display: grid; }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  background: rgba(8,11,18,.85);
}
.modal-overlay.active { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0 } }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 92%; max-width: 820px; max-height: 78vh;
  overflow-y: auto; padding: 32px;
  box-shadow: var(--shadow-lg);
  animation: modalIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(8px); } }

.modal h3 {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 600; font-style: italic;
  color: var(--text); letter-spacing: -0.2px; margin-bottom: 18px;
}
.modal pre {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 18px;
  font-family: var(--font-mono);
  font-size: 11px; line-height: 1.8; color: var(--text-2);
  overflow-x: auto; white-space: pre-wrap;
  max-height: 50vh; overflow-y: auto;
}
.modal .close {
  float: right; background: none; border: 1px solid var(--border);
  color: var(--text-3); font-size: 14px; cursor: pointer;
  padding: 4px 10px; border-radius: var(--radius-sm);
  font-family: var(--font-body); transition: all .15s;
}
.modal .close:hover { border-color: var(--red); color: var(--red); }

/* ─── Toast ─── */
.toast-root {
  position: fixed; bottom: 28px; right: 28px; z-index: 200;
  display: flex; flex-direction: column-reverse; gap: 8px;
}
.toast {
  padding: 12px 22px; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  letter-spacing: 0.3px; animation: toastIn .3s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast.ok  { background: #0d3320; border: 1px solid rgba(63,185,80,.3); color: var(--green); }
.toast.err { background: #331111; border: 1px solid rgba(248,81,73,.3);  color: var(--red); }
@keyframes toastIn { from { opacity:0; transform:translateX(12px); } }

/* ─── Loading ─── */
.loading {
  display: flex; align-items: center; gap: 10px;
  padding: 32px; color: var(--text-3); font-family: var(--font-mono); font-size: 12px;
}
.spinner {
  width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg) } }

.empty-state, .error-state {
  padding: 40px 24px; text-align: center; color: var(--text-3);
  font-family: var(--font-body); font-size: 13px;
}
.error-state { color: var(--red); }

/* ─── Responsive ─── */
@media (max-width: 860px) {
  body { padding: 24px 0 60px; }
  .container { padding: 0 16px; }
  .stats { grid-template-columns: 1fr 1fr; gap: 8px; }
  .svc-grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .header h1 { font-size: 26px; }
}
@media (max-width: 480px) {
  .stats { grid-template-columns: 1fr; }
  .stat .val { font-size: 24px; }
  .svc-body { flex-wrap: wrap; gap: 8px; }
}
</style>
</head>
<body>

<div class="container">
  <header class="header animate-in">
    <div class="header-left">
      <h1>任务<span>控制台</span></h1>
      <p class="subtitle">基础设施管理面板</p>
    </div>
    <span class="meta-badge" id="metaBadge">初始化中...</span>
  </header>

  <div class="stats" id="statsBar"></div>

  <div class="section-header animate-in">
    <h2>核心服务</h2>
    <span class="section-count" id="infraCount">—</span>
    <span class="section-refresh" id="refreshLabel"></span>
  </div>
  <div class="svc-grid" id="infraGrid"></div>

  <button class="sys-toggle" id="sysToggle" onclick="toggleSystem()">
    <span class="arrow">▸</span> 系统服务
    <span class="section-count" id="sysCount">—</span>
  </button>
  <div class="svc-grid sys-grid" id="sysGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast-root" id="toastRoot"></div>

<script>
const API = window.location.pathname.startsWith('/manage') ? '/manage' : '';

async function fetchJSON(url) { const r = await fetch(url); return r.json(); }
function fmtMB(mb) { return mb ? (mb < 1000 ? `${mb}MB` : `${(mb/1024).toFixed(1)}GB`) : '—'; }
function fmtUptime(s) {
  if (!s || s==='unknown') return '—';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  return h>24 ? `${Math.floor(h/24)}D ${Math.floor((h%24))}h` : h>0 ? `${h}h ${m}m` : `${m}m`;
}

async function loadResources() {
  try { return await fetchJSON(`${API}/api/resources`); }
  catch(e) { return {cpu:0,ram:{used:0,total:7.7,percent:0},disk:{used:0,total:40,percent:0},uptime:0}; }
}
async function loadServices() {
  try { return await fetchJSON(`${API}/api/services`); }
  catch(e) { return []; }
}

function splitServices(svcs) {
  const infra = [], sys = [];
  for (const s of svcs) {
    if (s.is_infra) { infra.push(s); }
    else { sys.push(s); }
  }
  return { infra, sys };
}

function renderStats(res) {
  const infraCards = document.querySelectorAll('#infraGrid .svc-card');
  const sysCards = document.querySelectorAll('#sysGrid .svc-card');
  const allCards = [...infraCards, ...sysCards];
  const total = allCards.length;
  const healthy = allCards.filter(c => c.classList.contains('ok')).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat">
      <div class="stat-icon">⬡</div>
      <div class="val">${String(healthy).padStart(2,'0')}<span style="font-size:14px;color:var(--text-3)">/${String(total).padStart(2,'0')}</span></div>
      <div class="lbl">节点在线</div>
      <div class="bar"><div class="bar-fill" style="width:${total?Math.round(healthy/total*100):0}%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-icon">◇</div>
      <div class="val">${String(Math.round(res.cpu)).padStart(3,'0')}<span style="font-size:14px;color:var(--text-3)">%</span></div>
      <div class="lbl">CPU 负载</div>
      <div class="bar"><div class="bar-fill" style="width:${Math.min(res.cpu,100)}%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-icon">◈</div>
      <div class="val">${res.ram.used}<span style="font-size:14px;color:var(--text-3)">/${res.ram.total}G</span></div>
      <div class="lbl">内存</div>
      <div class="bar"><div class="bar-fill" style="width:${res.ram.percent}%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-icon">◎</div>
      <div class="val">${fmtUptime(res.uptime)}</div>
      <div class="lbl">运行时间</div>
      <div class="bar"><div class="bar-fill" style="width:100%"></div></div>
    </div>`;
  document.getElementById('metaBadge').textContent = `磁盘 ${res.disk.used} / ${res.disk.total} GB`;
}

function renderServices(svcs) {
  const { infra, sys } = splitServices(svcs);
  document.getElementById('infraGrid').innerHTML = infra.map(cardHTML).join('');
  document.getElementById('sysGrid').innerHTML = sys.map(cardHTML).join('');
  document.getElementById('infraCount').textContent = infra.length;
  document.getElementById('sysCount').textContent = sys.length;
  document.getElementById('refreshLabel').textContent = `${svcs.length} 个节点 · 1分钟轮询`;
  // stagger animation on cards
  requestAnimationFrame(() => {
    document.querySelectorAll('.svc-card').forEach((c,i) => {
      c.style.animation = `fadeUp .4s ease both`;
      c.style.animationDelay = `${i * .03}s`;
    });
  });
}

function cardHTML(s) {
  const cls = s.status==='healthy'?'ok':s.status==='error'?'err':'warn';
  const nameEl = s.url
    ? `<a href="${s.url}" class="svc-name" target="_blank" onclick="event.stopPropagation()">${s.name}</a>`
    : `<span class="svc-name">${s.name}</span>`;
  const hasCtl = s.type === 'systemd';

  return `<div class="svc-card ${cls}" onclick="showLogs('${s.name}')">
    <div class="svc-top">
      <div class="svc-dot"></div>
      ${nameEl}
    </div>
    <div class="svc-body">
      <span><span class="key">端口</span> <span class="val">${s.port||'—'}</span></span>
      <span><span class="key">PID</span> <span class="val">${s.pid||'—'}</span></span>
      <span><span class="key">内存</span> <span class="val">${fmtMB(s.memory)}</span></span>
    </div>
    <div class="svc-actions" onclick="event.stopPropagation()">
      <button class="logs" onclick="event.stopPropagation();showLogs('${s.name}')">日志</button>
      ${hasCtl ? `
      <button class="restart" onclick="ctlService('${s.name}','restart')">重启</button>
      <button class="stop" onclick="ctlService('${s.name}','stop')">停止</button>
      <button class="start" onclick="ctlService('${s.name}','start')">启动</button>` : ''}
    </div>
  </div>`;
}

function toggleSystem() {
  const grid = document.getElementById('sysGrid');
  const btn = document.getElementById('sysToggle');
  grid.classList.toggle('open');
  btn.classList.toggle('open');
}

async function ctlService(name, action) {
  const r = await fetch(`${API}/api/ctl`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({svc:name,action})
  });
  const d = await r.json();
  toast(d.ok ? `${name} ${action} 成功` : d.error, d.ok);
  setTimeout(refresh, 1200);
}

async function showLogs(name) {
  const r = await fetch(`${API}/api/logs?svc=${name}`);
  const logs = await r.text();
  document.getElementById('modalContent').innerHTML = `
    <button class="close" onclick="closeModal()">✕</button>
    <h3>${name} &nbsp;/&nbsp; 日志</h3>
    <pre>${logs || '— 无输出 —'}</pre>`;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = `toast ${ok?'ok':'err'}`;
  el.textContent = msg;
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(), 3200);
  // auto-clean old toasts
  const toasts = document.getElementById('toastRoot').children;
  if (toasts.length > 4) toasts[0].remove();
}

async function refresh() {
  const [svcs, res] = await Promise.all([loadServices(), loadResources()]);
  renderServices(svcs);
  renderStats(res);
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
